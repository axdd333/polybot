mode = "live"
record_path = "data/live.ndjson"

[execution]
mode = "paper"

[execution.paper]
latency_ms = 90
stale_after_ms = 1500
rest_queue_mult = 1.05

[execution.live]
enabled = false
clob_host = "https://clob.polymarket.com/"
ws_host = "wss://ws-subscriptions-clob.polymarket.com"
private_key_env = "POLYMARKET_PRIVATE_KEY"
